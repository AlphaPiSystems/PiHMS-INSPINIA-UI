<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form>
                        <div class="row">
                            <div class="col-12 mb-2">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Test</h5>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Enter Test Name">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Code <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Enter Code">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Short Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Short Name">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Report Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Full Report Name">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Type <span
                                        class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="patient.Type" name="type">
                                    <option value="SNG">Single (SNG)</option>
                                    <option value="MUL">Multiple (MUL)</option>
                                    <option value="PRO">PRO (PRO)</option>
                                    <option value="PKG">Package (PKG)</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Investig. Type
                                    <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="Special">Special</option>
                                    <option value="Routine">Routine</option>
                                    <option value="Death">Death</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold  mb-1">Sample <span
                                        class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="">Select Sample</option>
                                    <option *ngFor="let sample of samples" [value]="sample.id">{{ sample.FullName }}
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Department <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Department">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Instrument <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Instrument">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Name in Inst.
                                    <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Inst. Name">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Report. Priority
                                    <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Priority">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Outsourced<span
                                        class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">NABL Approv.
                                    <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Methodology<span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Methodology">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Report.Type
                                    <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="VAL">Value</option>
                                    <option value="FIX">Fixed</option>
                                    <option value="MLN">MultiLine</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Report. Align
                                    <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="L">Left</option>
                                    <option value="B">Bold</option>
                                    <option value="N">None</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Page Break <span
                                        class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Notes <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Notes">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Comments <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Comments">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Unit <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="mg/dL">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Has Range <span
                                        class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10">
                                    <option value="Y">Yes</option>
                                    <option value="N">No</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Default Report Data <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="Default Report Data">
                            </div>
                        </div>
                        <!-- REFERENCE RANGES INSPINIA FORMAT -->
                        <div class="row">
                            <div class="col-lg-12 mb-1"
                                *ngIf="patient.Type !== 'MUL' && patient.Type !== 'PRO' && patient.Type !== 'PKG'">
                                <div class="ibox float-e-margins reference-range-ibox">
                                    <div class="ibox-title">
                                        <h5>Reference Ranges</h5>
                                        <button class="btn btn-primary btn-sm btn-add-range" type="button"
                                            (click)="addReferenceRange()">
                                            <i class="fa fa-plus"></i> Add Reference Range
                                        </button>
                                    </div>
                                    <div class="ibox-content">
                                        <table class="table table-bordered table-striped table-hover table-condensed reference-range-table">
                                            <thead>
                                                <tr>
                                                    <th class="sl-col">SL #</th>
                                                    <th class="min-w-60">Age Start</th>
                                                    <th class="min-w-60">Age End</th>
                                                    <th class="min-w-90">Age Unit</th>
                                                    <th class="min-w-100">Gender</th>
                                                    <th class="min-w-80">Min Value</th>
                                                    <th class="min-w-80">Max Value</th>
                                                    <th class="min-w-80">Min Panic</th>
                                                    <th class="min-w-80">Max Panic</th>
                                                    <th class="min-w-80">Unit</th>
                                                    <th class="min-w-140">Range Type</th>
                                                    <th class="min-w-200">RangeText</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr *ngFor="let range of referenceRanges; let i = index">
                                                    <td class="text-center">{{ i + 1 }}</td>
                                                    <td>
                                                        <input type="number" min="0" max="100"
                                                            class="form-control input-sm" [(ngModel)]="range.ageStart"
                                                            [name]="'ageStart' + i"
                                                            (ngModelChange)="validateAgeRange(range)"
                                                            [ngClass]="{'border-danger': range.ageError}"
                                                            title="{{range.ageError ? 'Age Start must be less than Age End' : ''}}">
                                                    </td>
                                                    <td>
                                                        <input type="number" min="0" max="100"
                                                            class="form-control input-sm" [(ngModel)]="range.ageEnd"
                                                            [name]="'ageEnd' + i"
                                                            (ngModelChange)="validateAgeRange(range)"
                                                            [ngClass]="{'border-danger': range.ageError}"
                                                            title="{{range.ageError ? 'Age Start must be less than Age End' : ''}}">
                                                    </td>
                                                    <td>
                                                        <select class="form-select form-control input-sm"
                                                            [(ngModel)]="range.ageUnit" [name]="'ageUnit' + i">
                                                            <option value="Year">Year</option>
                                                            <option value="Month">Month</option>
                                                            <option value="Day">Day</option>
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <select class="form-select form-control input-sm"
                                                            [(ngModel)]="range.gender" [name]="'gender' + i">
                                                            <option value="Female">Female</option>
                                                            <option value="Male">Male</option>
                                                            <option value="Both">Both</option>
                                                        </select>
                                                    </td>
                                                    <td><input type="text" class="form-control input-sm"
                                                            [(ngModel)]="range.minVal" [name]="'minVal' + i">
                                                    </td>
                                                    <td><input type="text" class="form-control input-sm"
                                                            [(ngModel)]="range.maxVal" [name]="'maxVal' + i">
                                                    </td>
                                                    <td><input type="text" class="form-control input-sm"
                                                            [(ngModel)]="range.minPanic" [name]="'minPanic' + i">
                                                    </td>
                                                    <td><input type="text" class="form-control input-sm"
                                                            [(ngModel)]="range.maxPanic" [name]="'maxPanic' + i">
                                                    </td>
                                                    <td>
                                                        <select class="form-select form-control input-sm"
                                                            [(ngModel)]="range.unit" [name]="'unit' + i">
                                                            <option value="" disabled>Select</option>
                                                            <option value="mg/dL">mg/dL</option>
                                                            <option value="g/dL">g/dL</option>
                                                            <option value="U/L">U/L</option>
                                                            <option value="mmol/L">mmol/L</option>
                                                            <option value="µg/dL">µg/dL</option>
                                                            <option value="%">%</option>
                                                            <option value="cells/mcL">cells/mcL</option>
                                                        </select>
                                                    </td>
                                                    <td>
                                                        <select class="form-select form-control input-sm"
                                                            [(ngModel)]="range.rangeType" [name]="'rangeType' + i">
                                                            <option value="SingleTextLine">SingleTextLine</option>
                                                            <option value="MultiTextLine">MultiTextLine</option>
                                                        </select>
                                                    </td>
                                                    <td><input type="text" class="form-control input-sm"
                                                            [(ngModel)]="range.rangeText" [name]="'rangeText' + i">
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-5">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/diagnostic-lab/test-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
