<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form #unitForm="ngForm" (ngSubmit)="saveUnit()">
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Unit</h5>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <!-- Name -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="e.g. mg/dL"
                                    [(ngModel)]="unit.Name" name="Name" required>
                            </div>

                            <!-- Full Name -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="e.g. Milligrams per Deciliter"
                                    [(ngModel)]="unit.FullName" name="FullName" required>
                            </div>

                            <!-- Display Name -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Display Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="e.g. mg/dL"
                                    [(ngModel)]="unit.DisplayName" name="DisplayName" required>
                            </div>

                            <!-- Description -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Description</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="e.g. Concentration of mass in deciliters"
                                    [(ngModel)]="unit.Description" name="Description">
                            </div>

                            <!-- Department Name -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Department <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="unit.DepartmentName" name="DepartmentName" required>
                                    <option value="" disabled>Select Department</option>
                                    <option value="Bio Chemistry">Bio Chemistry</option>
                                    <option value="Haematology">Haematology</option>
                                    <option value="Microbiology">Microbiology</option>
                                    <option value="Pathology">Pathology</option>
                                </select>
                            </div>

                            <!-- Branch Name -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Branch <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    placeholder="e.g. Main Branch"
                                    [(ngModel)]="unit.BranchName" name="BranchName" required>
                            </div>

                            <!-- Status -->
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Status <span class="text-danger">*</span></label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="unit.Status" name="Status" required>
                                    <option value="" disabled>Select Status</option>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/diagnostic-lab/units-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
