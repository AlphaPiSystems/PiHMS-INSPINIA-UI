<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form #wardForm="ngForm" (ngSubmit)="saveWard()">
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Ward</h5>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Ward ID <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.id" name="id" required placeholder="e.g. WRD001">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Ward Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.WardNumber" name="WardNumber" required placeholder="e.g. W-101">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.Name" name="Name" required placeholder="e.g. General Ward - Male">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Description</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.Description" name="Description" placeholder="e.g. Male General Ward">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Floor</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.FloorID" name="FloorID">
                                    <option [ngValue]="null" disabled>Select Floor</option>
                                    <option value="FLR001">First Floor</option>
                                    <option value="FLR002">Second Floor</option>
                                    <option value="FLR003">Third Floor</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Ward Type</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.WardTypeID" name="WardTypeID">
                                    <option value="" disabled>Select Ward Type</option>
                                    <option value="General">General</option>
                                    <option value="ICU">ICU</option>
                                    <option value="Pediatric">Pediatric</option>
                                    <option value="Private">Private</option>
                                    <option value="Semi-Private">Semi-Private</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Department</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.DepartmentID" name="DepartmentID">
                                    <option [ngValue]="null" disabled>Select Department</option>
                                    <option value="5">Clinical Pathology</option>
                                    <option value="3">Bio Chemistry</option>
                                    <option value="10">Microbiology</option>
                                    <option value="4">Cardiology</option>
                                    <option value="66">Neurology</option>
                                    <option value="DPT021">Oncology</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Phone Number</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.PhoneNumber" name="PhoneNumber">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Extension Number</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.ExtensionNumber" name="ExtensionNumber">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Status</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="ward.Status" name="Status">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/hospital/wards-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
