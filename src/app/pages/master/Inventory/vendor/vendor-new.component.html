<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form #vendorForm="ngForm" (ngSubmit)="saveVendor()">
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Vendor</h5>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold mb-1">Vendor Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.Name" name="Name" required placeholder="e.g. STORE">
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label fw-semibold mb-1">Address</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.Address" name="Address" placeholder="Address">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">City</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.City" name="City" placeholder="e.g. Bangalore">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">State</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.State" name="State" placeholder="e.g. Karnataka">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="form-label fw-semibold mb-1">Postal Code</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.PostalCode" name="PostalCode" placeholder="e.g. 560001">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold mb-1">Contact Person</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.ContactPersonName" name="ContactPersonName" placeholder="Name">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold mb-1">Contact Phone</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="vendorData.ContactPersonPhone" name="ContactPersonPhone" placeholder="Phone">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/misc/vendor-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
