<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form #countryForm="ngForm" (ngSubmit)="saveCountry()">
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Country</h5>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="country.Name" name="Name" required placeholder="e.g. India">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Is Supported</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="country.IsSupported" name="IsSupported">
                                    <option value="Y">Y</option>
                                    <option value="N">N</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Branch Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="country.BranchName" name="BranchName" placeholder="e.g. Main Branch">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Department Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="country.DepartmentName" name="DepartmentName" placeholder="e.g. Bio Chemistry">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Status</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="country.Status" name="Status">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/misc/country-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
