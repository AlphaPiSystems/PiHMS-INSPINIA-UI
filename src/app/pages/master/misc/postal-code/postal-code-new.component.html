<div class="container-fluid pt-3">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form #postalCodeForm="ngForm" (ngSubmit)="savePostalCode()">
                        <div class="row mb-3">
                            <div class="col-12">
                                <h5 class="text-primary mb-0 fw-semibold">Add New Postal Code</h5>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Postal Code <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.PostalCode" name="PostalCode" required placeholder="e.g. 400001">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Post Office Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.PostOfficeName" name="PostOfficeName" placeholder="e.g. Mumbai GPO">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Area Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.AreaName" name="AreaName" placeholder="e.g. Fort">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">City Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.CityName" name="CityName" placeholder="e.g. Mumbai">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">District Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.DistrictName" name="DistrictName" placeholder="e.g. Mumbai City">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">State Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.StateName" name="StateName" placeholder="e.g. Maharashtra">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Country Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.CountryName" name="CountryName" placeholder="e.g. India">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Branch Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.BranchName" name="BranchName" placeholder="e.g. Main Branch">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Department Name</label>
                                <input type="text" class="form-control form-control-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.DepartmentName" name="DepartmentName" placeholder="e.g. Bio Chemistry">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label fw-semibold mb-1">Status</label>
                                <select class="form-select form-select-sm border-light bg-light-op-10"
                                    [(ngModel)]="postalCodeData.Status" name="Status">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-light btn-sm px-4 py-2 border"
                                routerLink="/master/misc/postal-code-list">Cancel</button>
                            <button type="submit" class="btn btn-success btn-sm px-4 py-2">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
