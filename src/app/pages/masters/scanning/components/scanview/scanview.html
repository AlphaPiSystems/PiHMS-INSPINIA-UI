<div class="container-fluid">
    <app-page-title title="View Scan" />

    <div class="row" *ngIf="scan">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Scan Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #scanForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Scan Name</label>
                                <input disabled type="text" class="form-control" [(ngModel)]="scan.Name" name="Name" required placeholder="Enter Scan Name">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Description</label>
                                <input disabled type="text" class="form-control" [(ngModel)]="scan.Description" name="Description" placeholder="Enter Scan Description">
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" (click)="back()" class="btn btn-white" style="border: 1px solid #d2d2d2; background: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px; color: #555;">Back</button>
                <a [routerLink]="back()" (click)="navigateToEdit()" class="btn btn-primary" style="background: #1ab394; border-color: #1ab394; color: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px;">Edit Scan</a>
                            
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row" *ngIf="!scan">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <p class="text-muted">Loading scan data...</p>
                </div>
            </div>
        </div>
    </div>
</div>
