<div class="container-fluid">
    <app-page-title title="Add Scan" />

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Scan Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #scanForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Scan Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="scan.Name" name="Name" required placeholder="Enter Scan Name">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Description</label>
                                <input type="text" class="form-control" [(ngModel)]="scan.Description" name="Description" placeholder="Enter Scan Description">
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-light" (click)="cancel()">
                                Cancel
                            </button>
<button type="submit" class="btn btn-primary" [disabled]="!scanForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
