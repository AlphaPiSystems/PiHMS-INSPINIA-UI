<div class="container-fluid">
    <app-page-title title="View Scanning Item" />

    <div class="row" *ngIf="item">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Item Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #itemForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Scan Name</label>
                                <select disabled class="form-select" [(ngModel)]="item.ScanName" name="ScanName" (change)="onScanChange()" required>
                                    <option *ngFor="let s of scans" [value]="s.Name">{{ s.Name }}</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Title</label>
                                <input disabled type="text" class="form-control" [(ngModel)]="item.Title" name="Title" required placeholder="Enter Title">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Priority</label>
                                <input disabled type="number" class="form-control" [(ngModel)]="item.Priority" name="Priority" placeholder="Enter Priority">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Alignment</label>
                                <select disabled class="form-select" [(ngModel)]="item.Alignment" name="Alignment">
                                    <option value="LeftAlign">LeftAlign</option>
                                    <option value="LeftBold">LeftBold</option>
                                    <option value="AllBold">AllBold</option>
                                    <option value="LeftBoldWithUnderLine">LeftBoldWithUnderLine</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Value Type</label>
                                <select disabled class="form-select" [(ngModel)]="item.ValueType" name="ValueType">
                                    <option value="Text SingleLine">Text SingleLine</option>
                                    <option value="Text Value">Text Value</option>
                                    <option value="Number">Number</option>
                                    <option value="Date">Date</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea disabled class="form-control" [(ngModel)]="item.Description" name="Description" rows="4" placeholder="Enter Description"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" (click)="back()" class="btn btn-white" style="border: 1px solid #d2d2d2; background: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px; color: #555;">Back</button>
                <a [routerLink]="back()" (click)="navigateToEdit()" class="btn btn-primary" style="background: #1ab394; border-color: #1ab394; color: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px;">Edit Scanning Item</a>
                            
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row" *ngIf="!item">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <p class="text-muted">Loading item data...</p>
                </div>
            </div>
        </div>
    </div>
</div>
