<div class="container-fluid">
    <app-page-title title="Add Patient Insurance" />

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form (ngSubmit)="save()" #insForm="ngForm">
                        
                        <!-- Section 1: Core Policy Information -->
                        <h5 class="mb-3 text-primary">Policy Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Patient <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="insurance.PatientID" name="PatientID" required>
                                    <option [ngValue]="null" disabled selected>Select Patient</option>
                                    <option *ngFor="let p of patients" [ngValue]="p.id">{{ p.patientNo }} - {{ p.firstName }} {{ p.lastName }}</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Insurance Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.InsuranceName" name="InsuranceName" required placeholder="Insurance Name">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Policy Number <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.PolicyNumber" name="PolicyNumber" required placeholder="Policy Number">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Plan Number</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.PlanNumber" name="PlanNumber" placeholder="Plan Number">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Plan Type</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.PlanType" name="PlanType" placeholder="Plan Type">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Effective Date</label>
                                <input type="date" class="form-control" [(ngModel)]="insurance.EffectiveDate" name="EffectiveDate">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Expiry Date</label>
                                <input type="date" class="form-control" [(ngModel)]="insurance.ExpiryDate" name="ExpiryDate">
                            </div>
                        </div>

                        <hr class="my-4">

                        <hr class="my-4">

                        <!-- Section 3: Insurer Info -->
                        <h5 class="mb-3 text-primary">Insurer Details (As in Policy)</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Insurer Name</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.InsurerNameAsInPolicy" name="InsurerNameAsInPolicy" placeholder="Name as in Policy">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Address</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.Address" name="Address" placeholder="Address">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">City</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.City" name="City" placeholder="City">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">State</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.State" name="State" placeholder="State">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Postal Code</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.PostalCode" name="PostalCode" placeholder="Postal Code">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Country</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.Country" name="Country" placeholder="Country">
                            </div>
                        </div>

                        <hr class="my-4">

                        <!-- Section 4: Relationship Details -->
                        <h5 class="mb-3 text-primary">Relationship / Contact Details</h5>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Relationship</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.Relationship" name="Relationship" placeholder="e.g. Self, Spouse, Father">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Relation Name</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.RelationName" name="RelationName" placeholder="Relation Name">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Relation Phone</label>
                                <input type="text" class="form-control" [(ngModel)]="insurance.Relation_Phone" name="Relation_Phone" placeholder="Relation Phone">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Special Notes</label>
                                <textarea class="form-control" [(ngModel)]="insurance.SpecialNotes" name="SpecialNotes" rows="3" placeholder="Additional details..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="button" class="btn btn-light px-4" (click)="cancel()">
                                Cancel
                            </button>
<button type="submit" class="btn btn-primary px-4" [disabled]="!insForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
