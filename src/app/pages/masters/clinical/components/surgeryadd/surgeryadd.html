<div class="container-fluid">
    <app-page-title title="Add Surgery" />

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Surgery Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #surgeryForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Surgery Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="surgery.Name" name="Name" required placeholder="Enter Surgery Name">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Description</label>
                                <input type="text" class="form-control" [(ngModel)]="surgery.Description" name="Description" placeholder="Enter Description">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="surgery.DepartmentID" name="DepartmentID" required>
                                    <option [ngValue]="null" disabled selected>Select Department</option>
                                    <option *ngFor="let dept of departments" [ngValue]="dept.id">{{ dept.Name }}</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Branch <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="surgery.BranchID" name="BranchID" required>
                                    <option [ngValue]="null" disabled selected>Select Branch</option>
                                    <option *ngFor="let branch of branches" [ngValue]="branch.id">{{ branch.Name }}</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-light" (click)="cancel()">
                                Cancel
                            </button>
<button type="submit" class="btn btn-primary" [disabled]="!surgeryForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
