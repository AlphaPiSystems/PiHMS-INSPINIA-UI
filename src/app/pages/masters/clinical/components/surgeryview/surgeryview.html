<div class="container-fluid">
    <app-page-title title="View Surgery" />

    <div class="row" *ngIf="surgery">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Surgery Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #surgeryForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Surgery Name</label>
                                <input disabled type="text" class="form-control" [(ngModel)]="surgery.Name" name="Name" required placeholder="Enter Surgery Name">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Description</label>
                                <input disabled type="text" class="form-control" [(ngModel)]="surgery.Description" name="Description" placeholder="Enter Description">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Department</label>
                                <select disabled class="form-select" [(ngModel)]="surgery.DepartmentID" name="DepartmentID" required>
                                    <option [ngValue]="null" disabled selected>Select Department</option>
                                    <option *ngFor="let dept of departments" [ngValue]="dept.id">{{ dept.Name }}</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Branch</label>
                                <select disabled class="form-select" [(ngModel)]="surgery.BranchID" name="BranchID" required>
                                    <option [ngValue]="null" disabled selected>Select Branch</option>
                                    <option *ngFor="let branch of branches" [ngValue]="branch.id">{{ branch.Name }}</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" (click)="back()" class="btn btn-white" style="border: 1px solid #d2d2d2; background: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px; color: #555;">Back</button>
                <a [routerLink]="back()" (click)="navigateToEdit()" class="btn btn-primary" style="background: #1ab394; border-color: #1ab394; color: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px;">Edit Surgery</a>
                            
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row" *ngIf="!surgery">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <p class="text-muted">Loading surgery data...</p>
                </div>
            </div>
        </div>
    </div>
</div>
