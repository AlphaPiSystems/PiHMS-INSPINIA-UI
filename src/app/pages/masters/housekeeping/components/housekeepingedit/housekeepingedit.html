<div class="container-fluid">
    <app-page-title title="Edit Task" />

    <div class="row" *ngIf="task.id !== 0">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Task Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #taskForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Task Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="task.TaskName" name="TaskName" required placeholder="e.g. Floor Mopping">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="task.Category" name="Category" required>
                                    <option value="" disabled>Select Category</option>
                                    <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label fw-semibold">Description</label>
                                <input type="text" class="form-control" [(ngModel)]="task.Descriptions" name="Descriptions" placeholder="Enter detailed description">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Duration</label>
                                <input type="text" class="form-control" [(ngModel)]="task.Duration" name="Duration" placeholder="e.g. 30 mins">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Department <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="task.DepartmentID" name="DepartmentID" required>
                                    <option [ngValue]="null" disabled>Select Department</option>
                                    <option *ngFor="let dept of departments" [ngValue]="dept.id">{{ dept.Name }}</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Branch <span class="text-danger">*</span></label>
                                <select class="form-select" [(ngModel)]="task.BranchID" name="BranchID" required>
                                    <option [ngValue]="null" disabled>Select Branch</option>
                                    <option *ngFor="let branch of branches" [ngValue]="branch.id">{{ branch.Name }}</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">Notes</label>
                                <textarea class="form-control" [(ngModel)]="task.Notes" name="Notes" rows="2" placeholder="Add any special instructions or notes"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-light" (click)="cancel()">
                                Cancel
                            </button>
<button type="submit" class="btn btn-primary" [disabled]="!taskForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row" *ngIf="task.id === 0">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <p class="text-muted">Loading task data...</p>
                </div>
            </div>
        </div>
    </div>
</div>
