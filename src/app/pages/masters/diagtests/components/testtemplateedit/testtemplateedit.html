<div class="container-fluid">
    <app-page-title title="Edit Test Template" />

    <div class="row" *ngIf="template">
        <div class="col-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Template Details</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="save()" #templateForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Test Name</label>
                                <select class="form-select" [(ngModel)]="template.DiagTestID" name="DiagTestID" required (change)="onDiagTestChange()">
                                    <option [ngValue]="null">Select Test</option>
                                    <option *ngFor="let test of diagTests" [ngValue]="test.id">{{ test.Name }} ({{ test.Code }})</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Doctor / Staff</label>
                                <select class="form-select" [(ngModel)]="template.DoctorStaffID" name="DoctorStaffID" (change)="onDoctorChange()">
                                    <option [ngValue]="null">Select Doctor</option>
                                    <option *ngFor="let doc of doctors" [ngValue]="doc.id">{{ doc.Name }}</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Template Name</label>
                                <input type="text" class="form-control" [(ngModel)]="template.TemplateName" name="TemplateName" required placeholder="Enter Template Name">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Template Data (Rich Text)</label>
                                <quill-editor [(ngModel)]="template.TemplateData" name="TemplateData" [modules]="quillConfig" [placeholder]="'Enter Template Data...'" [styles]="{height: '500px'}"></quill-editor>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" [disabled]="!templateForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">
                                Update Template
                            </button>
                            <button type="button" class="btn btn-light" (click)="cancel()">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row" *ngIf="!template">
        <div class="col-12 text-center py-5">
            <p class="text-muted">Loading template details...</p>
        </div>
    </div>
</div>
