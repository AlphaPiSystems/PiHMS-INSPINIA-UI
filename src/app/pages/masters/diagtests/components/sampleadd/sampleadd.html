<div class="container-fluid">
  <app-page-title title="Add New Sample" />

  <div class="row">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form #sampleForm="ngForm" (ngSubmit)="saveChanges(sampleForm)" novalidate>
            <div class="row g-3">
              <!-- Full Name -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Full Name <span class="text-danger">*</span></label>
                <input type="text" [(ngModel)]="sample.FullName" name="FullName" #fullName="ngModel"
                  class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. Blood, Urine" required
                  [class.is-invalid]="fullName.invalid && (fullName.dirty || fullName.touched || sampleForm.submitted)">
                <div class="invalid-feedback" *ngIf="fullName.invalid && (fullName.dirty || fullName.touched || sampleForm.submitted)">
                  Full Name is required
                </div>
              </div>

              <!-- Short Name -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Short Name</label>
                <input type="text" [(ngModel)]="sample.ShortName" name="ShortName" class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. BLD">
              </div>

              <!-- Code -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Sample Code <span class="text-danger">*</span></label>
                <input type="text" [(ngModel)]="sample.Code" name="Code" #code="ngModel"
                  class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. SMP001" required
                  [class.is-invalid]="code.invalid && (code.dirty || code.touched || sampleForm.submitted)">
                <div class="invalid-feedback" *ngIf="code.invalid && (code.dirty || code.touched || sampleForm.submitted)">
                  Sample Code is required
                </div>
              </div>

              <!-- Sample Form -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Sample Form</label>
                <select [(ngModel)]="sample.SampleForm" name="SampleForm" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option *ngFor="let form of sampleForms" [value]="form">{{form}}</option>
                </select>
              </div>

              <!-- Container -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Container Type</label>
                <select [(ngModel)]="sample.Container" name="Container" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Container</option>
                  <option *ngFor="let container of containers" [value]="container">{{container}}</option>
                </select>
              </div>

              <!-- Branch -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Branch Name <span class="text-danger">*</span></label>
                <select class="form-select form-select-sm border-light-subtle shadow-none" [(ngModel)]="sample.BranchName" name="BranchName"
                  #branchName="ngModel" required
                  [class.is-invalid]="branchName.invalid && (branchName.dirty || branchName.touched || sampleForm.submitted)">
                    <option value="" disabled>Select Branch</option>
                    <option *ngFor="let branch of branches" [value]="branch.Name">{{ branch.Name }}</option>
                </select>
                <div class="invalid-feedback" *ngIf="branchName.invalid && (branchName.dirty || branchName.touched || sampleForm.submitted)">
                  Branch Name is required
                </div>
              </div>

              <!-- Department -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Department Name <span class="text-danger">*</span></label>
                <select class="form-select form-select-sm border-light-subtle shadow-none" [(ngModel)]="sample.DepartmentName" name="DepartmentName"
                  #departmentName="ngModel" required
                  [class.is-invalid]="departmentName.invalid && (departmentName.dirty || departmentName.touched || sampleForm.submitted)">
                    <option value="" disabled>Select Department</option>
                    <option *ngFor="let dept of departments" [value]="dept.Name">{{ dept.Name }}</option>
                </select>
                <div class="invalid-feedback" *ngIf="departmentName.invalid && (departmentName.dirty || departmentName.touched || sampleForm.submitted)">
                  Department Name is required
                </div>
              </div>

              <!-- Description -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Description <span class="text-danger">*</span></label>
                <input type="text" [(ngModel)]="sample.Description" name="Description" #description="ngModel"
                  class="form-control form-control-sm border-light-subtle shadow-none" placeholder="Additional notes about the sample type..." required
                  [class.is-invalid]="description.invalid && (description.dirty || description.touched || sampleForm.submitted)">
                <div class="invalid-feedback" *ngIf="description.invalid && (description.dirty || description.touched || sampleForm.submitted)">
                  Description is required
                </div>
              </div>
            </div>

            <div *ngIf="sampleForm.submitted && sampleForm.invalid" class="alert alert-danger d-flex align-items-center mt-3" style="border-radius: 2px; padding: 10px 15px;">
              <i class="fa fa-exclamation-triangle me-2" style="font-size: 16px;"></i>
              <span>Please fill in all mandatory fields marked with an asterisk (*).</span>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
              <button type="button" routerLink="/sample/samplelist" class="btn btn-light btn-sm px-4 fw-semibold border">Cancel</button>
              <button type="submit" class="btn btn-primary btn-sm px-4 fw-semibold" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
