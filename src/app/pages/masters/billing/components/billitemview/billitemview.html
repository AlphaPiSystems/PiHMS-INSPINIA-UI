<div class="container-fluid">
    <app-page-title title="View Bill Item" />

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header border-light justify-content-between">
                    <h5 class="card-title mb-0">Edit Information for {{ billItem.Name }}</h5>
                    <a [routerLink]="['/bill-item/bill-itemlist']" class="btn btn-light btn-sm">
                        <ng-icon name="tablerArrowLeft" class="me-1" />
                        Back to List
                    </a>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="onSubmit()" #billItemForm="ngForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input disabled type="text" class="form-control" name="Name" [(ngModel)]="billItem.Name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Short Name</label>
                                <input disabled type="text" class="form-control" name="ShortName" [(ngModel)]="billItem.ShortName">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Code</label>
                                <input disabled type="text" class="form-control" name="Code" [(ngModel)]="billItem.Code">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Type</label>
                                <select disabled class="form-select" name="Type" [(ngModel)]="billItem.Type">
                                    <option value="">Select Type</option>
                                    <option value="Service">Service</option>
                                    <option value="Product">Product</option>
                                    <option value="Consultation">Consultation</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Default Price</label>
                                <input disabled type="number" class="form-control" name="DefaultPrice" [(ngModel)]="billItem.DefaultPrice">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Is Depricated?</label>
                                <div class="form-check form-switch mt-2">
                                    <input disabled class="form-check-input" type="checkbox" name="IsDepricated" 
                                           [checked]="billItem.IsDepricated === 'Y'"
                                           (change)="billItem.IsDepricated = billItem.IsDepricated === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Varied Price?</label>
                                <div class="form-check form-switch mt-2">
                                    <input disabled class="form-check-input" type="checkbox" name="IsVariedPrice" 
                                           [checked]="billItem.IsVariedPrice === 'Y'"
                                           (change)="billItem.IsVariedPrice = billItem.IsVariedPrice === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Description</label>
                                <textarea disabled class="form-control" name="Description" rows="1" [(ngModel)]="billItem.Description"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-light" [routerLink]="['/bill-item/bill-itemlist']">Cancel</button>
                            <button type="button" (click)="back()" class="btn btn-white" style="border: 1px solid #d2d2d2; background: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px; color: #555;">Back</button>
                <a [routerLink]="back()" (click)="navigateToEdit()" class="btn btn-primary" style="background: #1ab394; border-color: #1ab394; color: #fff; padding: 8px 25px; font-weight: 600; border-radius: 2px;">Edit Bill Item</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
