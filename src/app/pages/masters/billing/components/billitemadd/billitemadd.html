<div class="container-fluid">
    <app-page-title title="Add Bill Item" />

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Bill Item Information</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="onSubmit()" #billItemForm="ngForm">
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Name" [(ngModel)]="billItem.Name" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Short Name</label>
                                <input type="text" class="form-control" name="ShortName" [(ngModel)]="billItem.ShortName">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Code</label>
                                <input type="text" class="form-control" name="Code" [(ngModel)]="billItem.Code">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Type</label>
                                <select class="form-select" name="Type" [(ngModel)]="billItem.Type">
                                    <option value="">Select Type</option>
                                    <option value="Service">Service</option>
                                    <option value="Product">Product</option>
                                    <option value="Consultation">Consultation</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Default Price</label>
                                <input type="number" class="form-control" name="DefaultPrice" [(ngModel)]="billItem.DefaultPrice">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Is Depricated?</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" name="IsDepricated" 
                                           [checked]="billItem.IsDepricated === 'Y'"
                                           (change)="billItem.IsDepricated = billItem.IsDepricated === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Varied Price?</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" name="IsVariedPrice" 
                                           [checked]="billItem.IsVariedPrice === 'Y'"
                                           (change)="billItem.IsVariedPrice = billItem.IsVariedPrice === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" name="Description" rows="3" [(ngModel)]="billItem.Description"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-light" [routerLink]="['/bill-item/bill-itemlist']">Cancel</button>
                            <button type="submit" class="btn btn-primary" [disabled]="!billItemForm.form.valid" style="background-color: #1ab394; border-color: #1ab394;">
                                Save Bill Item
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
