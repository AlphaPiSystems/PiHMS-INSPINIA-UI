<div class="container-fluid">
    <app-page-title title="Add Bill Item" />

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Bill Item Information</h5>
                </div>
                <div class="card-body">
                    <form (ngSubmit)="billItemForm.form.valid && billItem.Name?.trim() && billItem.DefaultPrice > 0 && onSubmit()" #billItemForm="ngForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Name" [(ngModel)]="billItem.Name" #nameInput="ngModel" required placeholder="Enter name">
                                <div class="text-danger mt-1"
                                     *ngIf="(nameInput.invalid || !billItem.Name?.trim()) && (nameInput.touched || billItemForm.submitted)">
                                    Name is required
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Short Name</label>
                                <input type="text" class="form-control" name="ShortName" [(ngModel)]="billItem.ShortName">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Code</label>
                                <input type="text" class="form-control" name="Code" [(ngModel)]="billItem.Code">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Type</label>
                                <select class="form-select" name="Type" [(ngModel)]="billItem.Type">
                                    <option value="">Select Type</option>
                                    <option value="Service">Service</option>
                                    <option value="Product">Product</option>
                                    <option value="Consultation">Consultation</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Default Price <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="DefaultPrice" [(ngModel)]="billItem.DefaultPrice" #priceInput="ngModel" required min="1" placeholder="Enter default price">
                                <div class="text-danger mt-1"
                                     *ngIf="(priceInput.invalid || billItem.DefaultPrice === undefined || billItem.DefaultPrice === null || billItem.DefaultPrice <= 0) && (priceInput.touched || billItemForm.submitted)">
                                    Default Price must be greater than 0
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Is Depricated?</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" name="IsDepricated" 
                                           [checked]="billItem.IsDepricated === 'Y'"
                                           (change)="billItem.IsDepricated = billItem.IsDepricated === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Varied Price?</label>
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" name="IsVariedPrice" 
                                           [checked]="billItem.IsVariedPrice === 'Y'"
                                           (change)="billItem.IsVariedPrice = billItem.IsVariedPrice === 'Y' ? 'N' : 'Y'">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" name="Description" rows="1" [(ngModel)]="billItem.Description"></textarea>
                            </div>
                        </div>

                        <div *ngIf="billItemForm.submitted && (billItemForm.invalid || !billItem.Name?.trim() || billItem.DefaultPrice === undefined || billItem.DefaultPrice === null || billItem.DefaultPrice <= 0)"
                             class="alert alert-danger d-flex align-items-center mb-3 mt-3"
                             style="border-radius: 2px; padding: 10px 15px;">
                            <i class="fa fa-exclamation-triangle me-2" style="font-size: 16px;"></i>
                            <span>Please fill in all mandatory fields marked with an asterisk (*).</span>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-light" [routerLink]="['/bill-item/bill-itemlist']">Cancel</button>
                            <button type="submit" class="btn btn-primary" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
