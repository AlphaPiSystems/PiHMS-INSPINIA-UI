<div class="container-fluid">
    <app-page-title title="Add Bill Domain" />

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header border-light">
                    <h5 class="card-title mb-0">Bill Domain Details</h5>
                </div>
                <div class="card-body">
                    <form #domainForm="ngForm" (ngSubmit)="domainForm.form.valid && billDomain.Name?.trim() && billDomain.Code?.trim() && onSubmit()">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="billDomain.Name" name="Name" #nameInput="ngModel" required placeholder="Enter domain name">
                                <div class="text-danger mt-1"
                                     *ngIf="(nameInput.invalid || !billDomain.Name?.trim()) && (nameInput.touched || domainForm.submitted)">
                                    Name is required
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Code <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" [(ngModel)]="billDomain.Code" name="Code" #codeInput="ngModel" required placeholder="Enter domain code">
                                <div class="text-danger mt-1"
                                     *ngIf="(codeInput.invalid || !billDomain.Code?.trim()) && (codeInput.touched || domainForm.submitted)">
                                    Code is required
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" [(ngModel)]="billDomain.Description" name="Description" rows="1" placeholder="Enter description"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Domain Type</label>
                                <select class="form-select" [(ngModel)]="billDomain.DomainType" name="DomainType">
                                    <option value="General">General</option>
                                    <option value="Specific">Specific</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Paper Size</label>
                                <select class="form-select" [(ngModel)]="billDomain.PaperSize" name="PaperSize">
                                    <option value="A4">A4</option>
                                    <option value="A5">A5</option>
                                    <option value="Letter">Letter</option>
                                    <option value="Legal">Legal</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Priority</label>
                                <input type="text" class="form-control" [(ngModel)]="billDomain.DomainPriority" name="DomainPriority" placeholder="Enter priority">
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-4">
                                    <input class="form-check-input" type="checkbox" id="headerImage" [(ngModel)]="billDomain.IsHeaderImagePresent" name="IsHeaderImagePresent" [checked]="billDomain.IsHeaderImagePresent === 'Y'" (change)="billDomain.IsHeaderImagePresent = billDomain.IsHeaderImagePresent === 'Y' ? 'N' : 'Y'">
                                    <label class="form-check-label" for="headerImage">Is Header Image Present?</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-4">
                                    <input class="form-check-input" type="checkbox" id="footerImage" [(ngModel)]="billDomain.IsFooterImagePresent" name="IsFooterImagePresent" [checked]="billDomain.IsFooterImagePresent === 'Y'" (change)="billDomain.IsFooterImagePresent = billDomain.IsFooterImagePresent === 'Y' ? 'N' : 'Y'">
                                    <label class="form-check-label" for="footerImage">Is Footer Image Present?</label>
                                </div>
                            </div>
                            <div class="col-md-6" *ngIf="billDomain.IsHeaderImagePresent === 'Y'">
                                <label class="form-label">Header Image</label>
                                <input type="file" class="form-control" name="HeaderImage">
                            </div>
                            <div class="col-md-6" *ngIf="billDomain.IsFooterImagePresent === 'Y'">
                                <label class="form-label">Footer Image</label>
                                <input type="file" class="form-control" name="FooterImage">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Domain Config</label>
                                <input type="text" class="form-control" [(ngModel)]="billDomain.DomainConfig" name="DomainConfig" placeholder="Enter domain config">
                            </div>
                        </div>

                        <div *ngIf="domainForm.submitted && (domainForm.invalid || !billDomain.Name?.trim() || !billDomain.Code?.trim())"
                             class="alert alert-danger d-flex align-items-center mb-3 mt-3"
                             style="border-radius: 2px; padding: 10px 15px;">
                            <i class="fa fa-exclamation-triangle me-2" style="font-size: 16px;"></i>
                            <span>Please fill in all mandatory fields marked with an asterisk (*).</span>
                        </div>

                        <div class="mt-4 d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-light" [routerLink]="['/bill-domain/bill-domainlist']">Cancel</button>
                            <button type="submit" class="btn btn-primary" style="background-color: #1ab394; border-color: #1ab394;">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
