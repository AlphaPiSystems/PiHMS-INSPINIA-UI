<div class="container-fluid">
  <app-page-title title="Edit City" />

  <div class="row">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
          <h5 class="card-title mb-0 text-dark fw-bold">City Information</h5>
          <p class="text-muted mb-0 fs-xs">Modify the details of the city below.</p>
        </div>

        <div class="card-body p-4">
          <form (ngSubmit)="saveChanges()">
            <div class="row g-3">
              <!-- City Name -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">City Name <span class="text-danger">*</span></label>
                <input type="text" [(ngModel)]="city.Name" name="Name" class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. Mumbai" required>
              </div>

              <!-- District -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">District</label>
                <select [(ngModel)]="city.DistrictName" name="DistrictName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select District</option>
                  <option *ngFor="let d of districts" [value]="d.Name">{{d.Name}}</option>
                </select>
              </div>

              <!-- State -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">State</label>
                <select [(ngModel)]="city.StateName" name="StateName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select State</option>
                  <option *ngFor="let s of states" [value]="s.Name">{{s.Name}}</option>
                </select>
              </div>

              <!-- Country -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Country</label>
                <select [(ngModel)]="city.CountryName" name="CountryName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Country</option>
                  <option *ngFor="let c of countries" [value]="c.Name">{{c.Name}}</option>
                </select>
              </div>

              <!-- Type -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Type</label>
                <input type="text" [(ngModel)]="city.Type" name="Type" class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. M">
              </div>

              <!-- Branch -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Branch</label>
                <select [(ngModel)]="city.BranchName" name="BranchName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Branch</option>
                  <option *ngFor="let b of branches" [value]="b.Name">{{b.Name}}</option>
                </select>
              </div>

              <!-- Department -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Department</label>
                <select [(ngModel)]="city.DepartmentName" name="DepartmentName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Department</option>
                  <option *ngFor="let d of departments" [value]="d.Name">{{d.Name}}</option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
              <button type="button" routerLink="/misc/city/citylist" class="btn btn-light btn-sm px-4 fw-semibold border">Cancel</button>
              <button type="submit" class="btn btn-primary btn-sm px-4 fw-semibold" style="background-color: #1ab394; border-color: #1ab394;">Update City</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
