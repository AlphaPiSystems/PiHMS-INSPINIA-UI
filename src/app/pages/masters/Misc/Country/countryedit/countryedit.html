<div class="container-fluid">
  <app-page-title title="Edit Country" />

  <div class="row">
    <div class="col-12">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4">
          <h5 class="card-title mb-0 text-dark fw-bold">Country Information</h5>
          <p class="text-muted mb-0 fs-xs">Modify the details of the country below.</p>
        </div>

        <div class="card-body p-4">
          <form (ngSubmit)="saveChanges()">
            <div class="row g-3">
              <!-- Country Name -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Country Name <span class="text-danger">*</span></label>
                <input type="text" [(ngModel)]="country.Name" name="Name" class="form-control form-control-sm border-light-subtle shadow-none" placeholder="e.g. India" required>
              </div>

              <!-- Is Supported -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Is Supported</label>
                <select [(ngModel)]="country.IsSupported" name="IsSupported" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="Y">Yes</option>
                  <option value="N">No</option>
                </select>
              </div>

              <!-- Branch -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Branch</label>
                <select [(ngModel)]="country.BranchName" name="BranchName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Branch</option>
                  <option *ngFor="let b of branches" [value]="b.Name">{{b.Name}}</option>
                </select>
              </div>

              <!-- Department -->
              <div class="col-md-6">
                <label class="form-label text-dark fw-semibold fs-xs text-uppercase">Department</label>
                <select [(ngModel)]="country.DepartmentName" name="DepartmentName" class="form-select form-select-sm border-light-subtle shadow-none">
                  <option value="">Select Department</option>
                  <option *ngFor="let d of departments" [value]="d.Name">{{d.Name}}</option>
                </select>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
              <button type="button" routerLink="/misc/country/countrylist" class="btn btn-light btn-sm px-4 fw-semibold border">Cancel</button>
              <button type="submit" class="btn btn-primary btn-sm px-4 fw-semibold" style="background-color: #1ab394; border-color: #1ab394;">Update Country</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
